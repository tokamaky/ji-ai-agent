spring:
  application:
    name: ji-ai-agent
  ai:
    google:
      genai:
        api-key: ${GEMINI_API_KEY}
        chat:
          options:
            model: ${GEMINI_CHAT_MODEL:gemini-2.5-flash-lite}
            temperature: 0.7
        embedding:
          text:
            options:
              model: ${GEMINI_EMBEDDING_MODEL:text-embedding-004}
      mcp:
        client:
          sse:
            connections:
              server1:
                url: ${MCP_IMAGE_SEARCH_URL:http://localhost:8127}
#          stdio:
#            servers-configuration: classpath:mcp-servers.json
    vectorstore:
      pgvector:
        index-type: HNSW
        dimensions: 768
        distance-type: COSINE_DISTANCE
        initialize-schema: true

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ai_project}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:123456}

server:
  port: ${PORT:8123}
  servlet:
    context-path: /api
    session:
      cookie:
        same-site: none
        secure: true
        http-only: true
# springdoc-openapi????
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.xiaohang.jiaiagent.controller
# knife4j???????????????
knife4j:
  enable: true
  setting:
    language:en-US
logging:
  level:
    org.springframework.ai: DEBUG

# application.yml
search:
  api-key: ${SEARCH_API_KEY}